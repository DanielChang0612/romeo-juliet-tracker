<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楓之谷: 羅密歐與茱麗葉 PQ 單機四開指揮官</title>
    <link rel="stylesheet" href="style.css?v=solo_v11">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <!-- Main App Screen -->
    <div id="app-screen" class="glass-panel active wide-panel" style="margin-top: 20px;">
        <header style="align-items: flex-start; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 20px;">
            <div class="room-info">
                <h2 style="font-size: 1.5rem; margin-bottom: 5px;">Romeo & Juliet <span>Solo Tracker</span></h2>
                <div class="guild-badge-small" style="display: inline-block;">✨ 單機四開指揮官 ✨</div>
            </div>
            
            <div id="slacker-banner" class="slacker-banner hidden"></div>

            <!-- Color Selector for Paint-Bucket Mode -->
            <div class="bucket-selector" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; margin-top: 15px;">
                <button class="color-bucket p0 active" data-color="0">紅</button>
                <button class="color-bucket p1" data-color="1">黃</button>
                <button class="color-bucket p2" data-color="2">綠</button>
                <button class="color-bucket p3" data-color="3">藍</button>
            </div>

            <div class="header-right">
                <button id="reset-btn" class="danger-btn" style="width:100%; border-radius: 8px; padding: 10px 15px; font-size: 1rem;">⚠️ 全局重置</button>
            </div>
        </header>

        <div class="control-board" id="control-board">
            <!-- JS generates the floor rows -->
        </div>
    </div>

    <script src="client.js?v=solo_v11"></script>
</body>
</html>
