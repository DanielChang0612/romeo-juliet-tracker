<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楓之谷: 羅密歐與茱麗葉 實時同步推斷器</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <!-- Login / Lobby Screen -->
    <div id="login-screen" class="glass-panel active">
        <h1>Romeo & Juliet<br><span>PQ Tracker</span></h1>
        <div class="input-group">
            <label>邀請碼 / 房間代號</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="room-input" placeholder="例如: 8888" value="8888">
                <button id="random-room-btn" class="secondary-btn" style="flex-shrink: 0;">🎲 隨機產生</button>
            </div>
        </div>
        <div class="input-group">
            <label>選擇你的身份角色</label>
            <div class="player-select">
                <button class="player-btn p0 selected" data-id="0">玩家 A</button>
                <button class="player-btn p1" data-id="1">玩家 B</button>
                <button class="player-btn p2" data-id="2">玩家 C</button>
                <button class="player-btn p3" data-id="3">玩家 D</button>
            </div>
        </div>
        <div class="input-group">
            <label>輸入你的遊戲 ID (選填)</label>
            <input type="text" id="my-name-input" placeholder="例如: 雙刀流" maxlength="10">
        </div>
        <button id="join-btn" class="primary-btn">進入實時戰場</button>
    </div>

    <!-- Main App Screen -->
    <div id="app-screen" class="glass-panel hidden wide-panel">
        <header>
            <div class="room-info">
                <h2>房間: <span id="display-room">---</span></h2>
                <div class="my-identity" id="display-identity">我是角色: ---</div>
            </div>
            <button id="reset-btn" class="danger-btn">全局重置</button>
        </header>

        <div class="app-layout">
            <!-- Left/Top: Action Card -->
            <section class="action-section">
                <div class="action-card">
                    <div class="floor-nav">
                        <button id="prev-floor-btn" class="icon-btn">⬅️ 退回</button>
                        <h3 id="current-floor-label">第 1 層</h3>
                        <button id="next-floor-btn" class="icon-btn">前進 ➡️</button>
                    </div>
                    <div class="action-buttons-wrapper">
                        <div class="action-buttons" id="action-buttons-container">
                            <!-- Buttons rendered via JS based on player color -->
                            <button class="plat-btn my-plat-btn" data-plat="0">1</button>
                            <button class="plat-btn my-plat-btn" data-plat="1">2</button>
                            <button class="plat-btn my-plat-btn" data-plat="2">3</button>
                            <button class="plat-btn my-plat-btn" data-plat="3">4</button>
                        </div>
                        <div class="floor-plate"></div>
                    </div>
                </div>
            </section>

            <!-- Right/Bottom: Cheat Sheet Table -->
            <section class="cheatsheet-section">
                <div class="cheatsheet-title">👁️ 全隊紀錄小抄</div>
                <table class="cheato-table">
                    <thead>
                        <tr>
                            <th>樓層</th>
                            <th class="th-p0">玩家 A</th>
                            <th class="th-p1">玩家 B</th>
                            <th class="th-p2">玩家 C</th>
                            <th class="th-p3">玩家 D</th>
                        </tr>
                    </thead>
                    <tbody id="cheatsheet-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </section>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
