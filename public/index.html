<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楓之谷: 羅密歐與茱麗葉 實時同步推斷器</title>
    <link rel="stylesheet" href="style.css?v=8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <!-- Login / Lobby Screen -->
    <div id="login-screen" class="glass-panel active">
        <h1>Romeo & Juliet<br><span>PQ Tracker</span></h1>
        <div class="guild-badge">✨ PiKaPi 公會專屬製作 ✨</div>
        
        <!-- 🔥 New Status Bar 🔥 -->
        <div id="connection-status" style="text-align: center; font-size: 0.8rem; margin-top: -15px; margin-bottom: 20px; color: var(--text-muted);">
            正在檢測網路狀態...
        </div>

        <div class="input-group">
            <label>邀請碼 / 房間代號</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="room-input" placeholder="例如: 8888" value="8888">
                <button id="random-room-btn" class="secondary-btn" style="flex-shrink: 0;">🎲 隨機產生</button>
            </div>
        </div>
        <div class="input-group">
            <label>選擇你的身份角色</label>
            <div class="player-select">
                <div class="player-slot">
                    <button class="player-btn p0" data-id="0">角色 A</button>
                    <div class="slot-info" id="slot-info-0">檢測狀態中...</div>
                </div>
                <div class="player-slot">
                    <button class="player-btn p1" data-id="1">角色 B</button>
                    <div class="slot-info" id="slot-info-1">檢測狀態中...</div>
                </div>
                <div class="player-slot">
                    <button class="player-btn p2" data-id="2">角色 C</button>
                    <div class="slot-info" id="slot-info-2">檢測狀態中...</div>
                </div>
                <div class="player-slot">
                    <button class="player-btn p3" data-id="3">角色 D</button>
                    <div class="slot-info" id="slot-info-3">檢測狀態中...</div>
                </div>
            </div>
        </div>
        <div class="input-group">
            <label>輸入你的遊戲 ID (必填)</label>
            <input type="text" id="my-name-input" placeholder="例如: 雙刀流" maxlength="10">
        </div>
        <button id="join-btn" class="primary-btn">進入實時戰場</button>
    </div>

    <!-- Main App Screen -->
    <div id="app-screen" class="glass-panel hidden wide-panel">
        <header>
            <div class="room-info">
                <h2>房間: <span id="display-room">---</span></h2>
                <div class="my-identity" id="display-identity">我是角色: ---</div>
                
                <!-- 🔥 Mini Status Grid 🔥 -->
                <div class="mini-status-grid">
                    <div class="status-dot p0" id="mini-dot-0"></div>
                    <div class="status-dot p1" id="mini-dot-1"></div>
                    <div class="status-dot p2" id="mini-dot-2"></div>
                    <div class="status-dot p3" id="mini-dot-3"></div>
                </div>

                <div id="app-status" style="font-size: 0.7rem; color: var(--text-muted); font-weight: 800;"></div>
            </div>
            <div class="header-right">
                <button id="toggle-members-btn" class="secondary-btn-small">👥 成員列表</button>
                <div class="guild-badge-small">🛡️ PiKaPi</div>
                <button id="reset-btn" class="danger-btn">全局重置</button>
            </div>
        </header>
        
        <!-- 🔥 Team HUD (Pop-out/Hidden by default) 🔥 -->
        <div class="team-hud hidden" id="team-hud"></div>

        <!-- My Path Tracker -->
        <div class="my-path-card" style="margin-bottom: 20px;">
            <span class="path-label">我的路徑</span>
            <span class="path-values" id="my-path-display">? &nbsp; ? &nbsp; ? &nbsp; ? &nbsp; ? &nbsp;&nbsp;&nbsp; ? &nbsp; ? &nbsp; ? &nbsp; ? &nbsp; ?</span>
        </div>

        <div class="accordion-board" id="accordion-board">
            <!-- JS generates the floor rows -->
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js?v=9"></script>
</body>
</html>
